      closing:"পড়ার সময় নয়, পড়ার পদ্ধতিই আসল পার্থক্য তৈরি করে।"
    },
    { id:5, title:"From Zero to 10K Subscribers: A Success Story", tag:"Success Stories", author:"Rahad", date:"3 weeks ago", readTime:"8 min read", img:"https://images.unsplash.com/photo-1553877522-43269d4ea984?w=900&h=500&fit=crop&q=65&auto=format",
      body:["প্রতিটা বড় চ্যানেলেরই একটা শূন্য থেকে শুরুর গল্প থাকে। আজকের গল্পটা তেমনই একজনের, যিনি ধারাবাহিকতা দিয়ে এগিয়েছেন।"],
      points:["প্রথম ৬ মাস কোনো গ্রোথ ছিল না", "কনটেন্টের মান নিয়ে কাজ করা শুরু করেন", "দর্শকদের কমেন্ট থেকে শেখা", "ধারাবাহিক আপলোড শিডিউল মেনে চলা"],
      closing:"সাফল্য একদিনে আসে না — কিন্তু সঠিক দিকে ধারাবাহিক চেষ্টা ফলাফল দেয়ই।"
    },
    { id:6, title:"Why Discipline Beats Motivation", tag:"Motivation", author:"Rahad", date:"1 month ago", readTime:"5 min read", img:"https://images.unsplash.com/photo-1434030216411-0b793f4b4173?w=900&h=500&fit=crop&q=65&auto=format",
      body:["মোটিভেশন একটা অনুভূতি, যা আসে আর যায়। কিন্তু ডিসিপ্লিন একটা সিস্টেম, যা প্রতিদিন কাজ করে — মন চাক বা না চাক।"],
      points:["ছোট, বাস্তবসম্মত রুটিন তৈরি করুন", "ফলাফলের চেয়ে প্রক্রিয়ায় ফোকাস করুন", "নিজের সাথে করা প্রতিশ্রুতি রাখুন"],
      closing:"অপেক্ষা করবেন না মন চাওয়ার জন্য — শুরু করুন, মন চাওয়া পরে আসবে।"
    }
  ];

  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id')) || 1;
  const article = articles.find(a => a.id === id) || articles[0];

  document.title = article.title + " — Hey Rahad";

  const initials = article.author.slice(0,2).toUpperCase();
  const bodyHtml = article.body.map(p => `<p>${p}</p>`).join('');
  const pointsHtml = article.points ? `<ul>${article.points.map(p => `<li>${p}</li>`).join('')}</ul>` : '';

  document.getElementById('articleContent').innerHTML = `
    <span class="article-tag">${article.tag}</span>
    <h1 class="article-title">${article.title}</h1>
    <div class="article-meta">
      <span class="author-avatar">${initials}</span>
      <span>${article.author}</span> • <span>${article.date}</span> • <span>${article.readTime}</span>
    </div>
    <img class="article-cover" src="${article.img}" alt="${article.title}" loading="lazy">
    <div class="article-body">
      ${bodyHtml}
      ${pointsHtml}
      <p>${article.closing}</p>
    </div>
    <div class="share-row">
      <span>শেয়ার করুন:</span>
      <button class="icon-btn" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></button>
      <button class="icon-btn" aria-label="WhatsApp"><i class="fa-brands fa-whatsapp"></i></button>
      <button class="icon-btn" aria-label="Copy link" id="copyLinkBtn"><i class="fa-solid fa-link"></i></button>
    </div>
  `;

  const related = articles.filter(a => a.id !== article.id).slice(0, 4);
  document.getElementById('relatedGrid').innerHTML = related.map(a => `
    <a class="related-card" href="blog-post.html?id=${a.id}">
      <div class="related-thumb lazy-bg" data-bg="${a.img}"></div>
      <div class="related-body">
        <div class="related-title">${a.title}</div>
      </div>
    </a>
  `).join('');

  // Lazy-load related-article thumbnails only when scrolled into view
  if ('IntersectionObserver' in window) {
    const lazyImgObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const el = entry.target;
          if (el.dataset.bg) el.style.backgroundImage = `url('${el.dataset.bg}')`;
          lazyImgObserver.unobserve(el);
        }
      });
    }, { rootMargin: '200px' });
    document.querySelectorAll('.lazy-bg[data-bg]').forEach(el => lazyImgObserver.observe(el));
  } else {
    document.querySelectorAll('.lazy-bg[data-bg]').forEach(el => {
      el.style.backgroundImage = `url('${el.dataset.bg}')`;
    });
  }

  document.getElementById('copyLinkBtn').addEventListener('click', () => {
    alert('লিংক কপি হয়েছে! (ডেমো)');
  });

  const hamburgerBtn = document.getElementById('hamburgerBtn');
  const mobileMenu = document.getElementById('mobileMenu');
  hamburgerBtn.addEventListener('click', () => mobileMenu.classList.toggle('open'));
  mobileMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => mobileMenu.classList.remove('open')));

  // Share button — native share sheet on supported devices, clipboard copy as fallback
  const shareBtn = document.getElementById('shareBtn');
  if (shareBtn) {
    shareBtn.addEventListener('click', async () => {
      const shareData = {
        title: document.title,
        text: 'Hey Rahad — Learn, Build, Grow. দেখে নিন:',
        url: window.location.href
      };
      if (navigator.share) {
        try { await navigator.share(shareData); } catch (err) { /* user cancelled, ignore */ }
      } else {
        try {
          await navigator.clipboard.writeText(shareData.url);
          shareBtn.innerHTML = '<i class="fa-solid fa-check"></i>';
          setTimeout(() => { shareBtn.innerHTML = '<i class="fa-solid fa-share-nodes"></i>'; }, 1800);
        } catch (err) {
          alert(shareData.url);
        }
      }
    });
  }

  const toggle = document.getElementById('themeToggle');
  let isLight = false;
  toggle.addEventListener('click', () => {
    isLight = !isLight;
    document.body.classList.toggle('light-mode', isLight);
    toggle.innerHTML = isLight ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
  });
</script>

</html>
